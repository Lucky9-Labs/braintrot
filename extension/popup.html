<!DOCTYPE html>
<html>
<head>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 340px;
    font-family: Georgia, "Times New Roman", serif;
    font-size: 13px;
    color: #2a2a2a;
    background: #f5f3ef;
  }
  header {
    background: #f5f3ef;
    color: #2a2a2a;
    padding: 16px;
    font-size: 16px;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 2px solid #e0ddd7;
  }
  header .logo {
    height: 20px;
    width: auto;
  }
  header .name {
    font-family: Georgia, serif;
    letter-spacing: 0.5px;
  }
  header .accent {
    color: #00C3F7;
  }

  .section {
    padding: 14px 16px;
    border-bottom: 1px solid #e0ddd7;
  }
  .section-title {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-weight: 600;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #999;
    margin-bottom: 8px;
  }
  .input-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  input[type="text"] {
    flex: 1;
    padding: 8px 10px;
    background: #fff;
    border: 1px solid #d4d0c8;
    border-radius: 6px;
    font-size: 13px;
    color: #2a2a2a;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  input[type="text"]::placeholder { color: #b8b4ac; }
  input[type="text"]:focus { border-color: #00C3F7; }

  button.add-btn {
    padding: 8px 14px;
    background: #00C3F7;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    font-family: -apple-system, sans-serif;
    transition: all 0.15s;
  }
  button.add-btn:hover {
    background: #00b0e0;
  }

  .tag-list {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 6px;
    padding: 5px 8px 5px 10px;
    font-size: 12px;
    font-family: -apple-system, sans-serif;
  }
  .tag.phrase {
    background: #fce8e8;
    color: #c0392b;
    border: 1px solid #f0c4c4;
  }
  .tag.account {
    background: #e8f8f0;
    color: #27ae60;
    border: 1px solid #c4e8d4;
  }
  .tag .remove {
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    opacity: 0.5;
    padding: 0 2px;
    transition: opacity 0.15s;
  }
  .tag .remove:hover { opacity: 1; }

  .empty {
    color: #b8b4ac;
    font-style: italic;
    font-size: 12px;
    padding: 4px 0;
  }
  .hint {
    color: #999;
    font-size: 11px;
    margin-top: 8px;
    line-height: 1.4;
  }
  .toggle-row {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    font-family: -apple-system, sans-serif;
    font-size: 13px;
  }
  .toggle-row input[type="checkbox"] {
    accent-color: #00C3F7;
    width: 16px;
    height: 16px;
  }
  .toggle-label {
    font-weight: 500;
  }
  .status {
    padding: 12px 16px;
    text-align: center;
    color: #999;
    font-size: 11px;
    font-family: -apple-system, sans-serif;
  }
</style>
</head>
<body>

<header>
  <img class="logo" src="icon.svg" alt="Braintrot">
  <span class="name">brain<span class="accent">trot</span></span>
</header>

<div class="section">
  <div class="section-title">Block phrases</div>
  <div class="input-row">
    <input type="text" id="phrase-input" placeholder="e.g. spoiler, finale, ending">
    <button class="add-btn" id="add-phrase">Add</button>
  </div>
  <div class="tag-list" id="phrase-list"></div>
  <div class="hint">Matching posts get replaced with a vocab quiz card.</div>
</div>

<div class="section">
  <div class="section-title">Whitelisted accounts</div>
  <div class="input-row">
    <input type="text" id="account-input" placeholder="e.g. dc_comics">
    <button class="add-btn" id="add-account">Add</button>
  </div>
  <div class="tag-list" id="account-list"></div>
  <div class="hint">Posts from these @handles are never replaced.</div>
</div>

<div class="section">
  <label class="toggle-row">
    <input type="checkbox" id="mote-toggle">
    <span class="toggle-label">Mote companion</span>
  </label>
  <div class="hint">A glowing buddy that orbits cards and reacts to your answers.</div>
</div>

<div class="status" id="status">Loading...</div>

<script src="popup.js"></script>
</body>
</html>
